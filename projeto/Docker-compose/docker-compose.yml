version: "3"
services: 
  mysql_knex:
    env_file:
      - .env
    container_name: Banco_para_dados
    hostname: Banco_para_dados
    image: mysql:8.0
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_force_recovery=0
      - --authentication-policy=mysql_native_password
    volumes: 
      - C:/Users/Gustavo/Documents/SistemaDeCadastro/MySql:/var/lib/mysql
    ports:
      - 3307:3306
    environment:
      TZ: America/Sao_Paulo